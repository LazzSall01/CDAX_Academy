{% extends "base.html" %}

{% block titulo %}Iniciar Sesión - CDAX Academy{% endblock %}

{% block contenido %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-b from-cedax-primary via-cedax-primary-dark to-cedax-primary py-20 relative overflow-hidden">
    <!-- Fondo decorativo -->
    <div class="absolute inset-0 bg-grid-luxury opacity-20"></div>
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-cedax-secondary/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-cedax-secondary/5 rounded-full blur-3xl"></div>
    
    <div class="relative z-10 w-full max-w-md px-8">
        <!-- Logo -->
        <div class="text-center mb-10">
            <div class="w-20 h-20 mx-auto mb-6 flex items-center justify-center border-2 border-cedax-secondary bg-gradient-to-br from-cedax-secondary to-cedax-secondary-dark rounded-sm shadow-lg shadow-cedax-secondary/30">
                <span class="font-display text-3xl text-white font-bold">C</span>
            </div>
            <h1 class="font-display text-4xl text-cedax-cream mb-2">CDAX <span class="text-gold-luxury">Academy</span></h1>
            <p class="font-sans text-sm text-cedax-beige tracking-wide">Centro Dental Avanzado Xalapa</p>
        </div>
        
        <!-- Card de login -->
        <div class="glass-luxury-dark rounded-lg p-8">
            <!-- Tabs -->
            <div class="flex mb-8 border-b border-cedax-secondary/20">
                <button id="tab-login" class="flex-1 pb-4 text-sm font-sans text-cedax-secondary border-b-2 border-cedax-secondary transition-colors" onclick="showTab('login')">
                    Iniciar Sesión
                </button>
                <button id="tab-registro" class="flex-1 pb-4 text-sm font-sans text-cedax-beige hover:text-cedax-cream transition-colors" onclick="showTab('registro')">
                    Registrarse
                </button>
            </div>
            
            <!-- Formulario Login -->
            <form id="form-login" action="/auth/login" method="POST" class="space-y-6">
                <div>
                    <label class="block font-sans text-sm text-cedax-cream/70 mb-2">Email</label>
                    <input type="email" name="email" required 
                           class="input-luxury w-full px-4 py-3 rounded-sm font-sans text-sm"
                           placeholder="tu@email.com">
                </div>
                <div>
                    <label class="block font-sans text-sm text-cedax-cream/70 mb-2">Contraseña</label>
                    <input type="password" name="contrasena" required 
                           class="input-luxury w-full px-4 py-3 rounded-sm font-sans text-sm"
                           placeholder="••••••••">
                </div>
                <button type="submit" class="btn-luxury w-full py-3 text-sm rounded-sm">
                    Acceder
                </button>
            </form>
            
            <!-- Formulario Registro -->
            <form id="form-registro" action="/auth/registro" method="POST" class="space-y-6 hidden">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-sans text-sm text-cedax-cream/70 mb-2">Nombre</label>
                        <input type="text" name="nombre" required 
                               class="input-luxury w-full px-4 py-3 rounded-sm font-sans text-sm"
                               placeholder="Nombre">
                    </div>
                    <div>
                        <label class="block font-sans text-sm text-cedax-cream/70 mb-2">Apellido</label>
                        <input type="text" name="apellido" required 
                               class="input-luxury w-full px-4 py-3 rounded-sm font-sans text-sm"
                               placeholder="Apellido">
                    </div>
                </div>
                <div>
                    <label class="block font-sans text-sm text-cedax-cream/70 mb-2">Email</label>
                    <input type="email" name="email" required 
                           class="input-luxury w-full px-4 py-3 rounded-sm font-sans text-sm"
                           placeholder="tu@email.com">
                </div>
                <div>
                    <label class="block font-sans text-sm text-cedax-cream/70 mb-2">Contraseña</label>
                    <input type="password" name="contrasena" required 
                           class="input-luxury w-full px-4 py-3 rounded-sm font-sans text-sm"
                           placeholder="••••••••">
                </div>
                <button type="submit" class="btn-luxury w-full py-3 text-sm rounded-sm">
                    Crear Cuenta
                </button>
            </form>
            
            <!-- Divider -->
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-cedax-secondary/20"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-cedax-primary text-cedax-beige font-sans">o</span>
                </div>
            </div>
            
            <!-- Botón Demo -->
            <a href="/auth/demo" class="flex items-center justify-center gap-3 w-full py-3 border border-cedax-secondary/40 rounded-sm hover:bg-cedax-secondary/15 transition-all group">
                <svg class="w-5 h-5 text-cedax-secondary group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="font-sans text-sm text-cedax-secondary">Modo Demo</span>
            </a>
        </div>
        
        <!-- Footer del login -->
        <p class="text-center mt-8 font-sans text-sm text-cedax-beige/60">
            ¿Necesitas ayuda? <a href="https://wa.me/5215530000000" class="text-cedax-secondary hover:underline">Contáctanos</a>
        </p>
    </div>
</div>

<script>
function showTab(tab) {
    const loginTab = document.getElementById('tab-login');
    const registroTab = document.getElementById('tab-registro');
    const loginForm = document.getElementById('form-login');
    const registroForm = document.getElementById('form-registro');
    
    if (tab === 'login') {
        loginTab.className = 'flex-1 pb-4 text-sm font-sans text-cedax-secondary border-b-2 border-cedax-secondary transition-colors';
        registroTab.className = 'flex-1 pb-4 text-sm font-sans text-cedax-beige hover:text-cedax-cream transition-colors';
        loginForm.classList.remove('hidden');
        registroForm.classList.add('hidden');
    } else {
        registroTab.className = 'flex-1 pb-4 text-sm font-sans text-cedax-secondary border-b-2 border-cedax-secondary transition-colors';
        loginTab.className = 'flex-1 pb-4 text-sm font-sans text-cedax-beige hover:text-cedax-cream transition-colors';
        registroForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
    }
}
</script>
{% endblock %}
