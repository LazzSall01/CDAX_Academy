{% extends "base.html" %}

{% block titulo %}Error {{ codigo }} - CDAX Academy{% endblock %}

{% block contenido %}
<div class="min-h-screen bg-cedax-primary flex items-center justify-center">
    <div class="text-center px-6">
        <h1 class="font-display text-9xl font-bold text-cedax-secondary">{{ codigo }}</h1>
        <h2 class="font-display text-2xl font-semibold text-white mt-4">Algo salió mal</h2>
        <p class="font-sans text-cedax-cream/70 mt-2">{{ mensaje }}</p>
        <a href="/" class="btn-luxury inline-block mt-8 px-6 py-3 rounded-lg font-semibold">
            Volver al Inicio
        </a>
    </div>
</div>
{% endblock %}
