services:
  traefik:
    image: traefik:v3.1
    container_name: dental_academy_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.address=:80"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@dentalmodernacademy.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
    ports:
      - "80:80"
      - "443:443"
      - "8090:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - dental_network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: dental_academy_postgres
    environment:
      POSTGRES_DB: dental_academy
      POSTGRES_USER: dental_user
      POSTGRES_PASSWORD: dental_pass_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dental_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental_user -d dental_academy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dental_academy_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - dental_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dental_academy_web
    environment:
      DATABASE_URL: postgresql://dental_user:dental_pass_2024@postgres:5432/dental_academy
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./app:/app/app
      - static_files:/app/static
    networks:
      - dental_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.routers.websecure.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.websecure.entrypoints=websecure"
      - "traefik.http.routers.websecure.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=8000"
    restart: unless-stopped

networks:
  dental_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  letsencrypt:
  static_files:
